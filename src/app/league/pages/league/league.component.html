<div class="league-shell">
  <div class="mana-backdrop" aria-hidden="true">
    <img class="mana-watermark mana-white" src="assets/mana/W.svg" alt="">
    <img class="mana-watermark mana-blue" src="assets/mana/U.svg" alt="">
    <img class="mana-watermark mana-black" src="assets/mana/B.svg" alt="">
    <img class="mana-watermark mana-red" src="assets/mana/R.svg" alt="">
    <img class="mana-watermark mana-green" src="assets/mana/G.svg" alt="">
  </div>

  <header class="app-header">
    <a class="brand" routerLink="/parties" aria-label="Fabulous Edgar Markov Tournament, accueil">
      <span class="brand-mark" aria-hidden="true">F</span>
      <span class="brand-copy">
        <strong>Fabulous Edgar Markov</strong>
        <small>Tournament</small>
      </span>
    </a>

    <nav class="main-nav" aria-label="Navigation principale">
      <a routerLink="/parties" routerLinkActive="active">
        <span class="nav-index" aria-hidden="true">01</span>
        <span>Parties</span>
      </a>
      <a routerLink="/classement" routerLinkActive="active">
        <span class="nav-index" aria-hidden="true">02</span>
        <span>Classement</span>
      </a>
    </nav>

    <div class="session-actions">
      @if (authService.user$ | async; as user) {
        <div class="user-chip" [title]="user.email || ''">
          <span class="user-avatar" aria-hidden="true">{{ (user.displayName || user.email || '?').charAt(0).toUpperCase() }}</span>
          <span class="user-email">{{ user.email }}</span>
        </div>
      }
      <button type="button" class="logout-button" (click)="logout()">
        <span class="logout-label">Déconnexion</span>
        <span class="logout-arrow" aria-hidden="true">→</span>
      </button>
    </div>
  </header>

  <main class="app-content">
    <router-outlet></router-outlet>
  </main>
</div>
