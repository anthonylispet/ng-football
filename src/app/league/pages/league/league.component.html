<header class="app-header">
  <a class="brand" routerLink="/parties" aria-label="Fabulous Edgar Markov Tournament, accueil">
    <span class="brand-mark" aria-hidden="true">✦</span>
    <span class="brand-copy">
      <strong>Fabulous Edgar Markov</strong>
      <small>Tournament</small>
    </span>
  </a>

  <nav class="main-nav" aria-label="Navigation principale">
    <a routerLink="/parties" routerLinkActive="active">Parties</a>
    <a routerLink="/classement" routerLinkActive="active">Classement</a>
  </nav>

  <div class="session-actions">
    @if (authService.user$ | async; as user) {
      <span class="user-email">{{ user.email }}</span>
    }
    <button type="button" class="logout-button" (click)="logout()" aria-label="Se déconnecter">
      <span aria-hidden="true">↗</span>
      <span class="logout-label">Déconnexion</span>
    </button>
  </div>
</header>

<main class="app-content">
  <router-outlet></router-outlet>
</main>
